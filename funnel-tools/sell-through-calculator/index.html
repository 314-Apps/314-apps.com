<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell-Through Calculator — Inventr</title>
  <meta name="description" content="Inventory velocity and days-on-hand for your closet or booth.">
  <link rel="canonical" href="https://consignment.314-apps.com/funnel-tools/sell-through-calculator/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body data-tool="sell-through-calculator">
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">Inventr</a>
      <nav class="nav-links">
        <a href="/">Guides</a>
        <a href="/funnel-tools/">Free Tools</a>
        <a class="btn btn--primary btn--sm" href="https://apps.apple.com/us/app/resell-tracker-flip-profit/id6753903683?utm_source=funnel_tools&amp;utm_medium=sell-through-calculator" target="_blank" rel="noopener">Try Inventr Free</a>
      </nav>
    </div>
  </header>
  <section class="hero hero--small">
    <div class="container">
      <h1>Sell-Through Calculator</h1>
      <p>Inventory velocity and days-on-hand for your closet or booth.</p>
    </div>
  </section>
  <main>
    <div class="container">
      <div class="tool-panel">
        <div class="tool-grid-2">
          <div class="tool-field"><label for="startUnits">Starting active listings</label><input type="number" id="startUnits" min="0" step="1" value="200"></div>
          <div class="tool-field"><label for="soldUnits">Units sold in period</label><input type="number" id="soldUnits" min="0" step="1" value="38"></div>
          <div class="tool-field"><label for="days">Days in period</label><input type="number" id="days" min="1" step="1" value="30"></div>
        </div>
        <div class="tool-results"><h3>Sell-through</h3><dl>
            <dt>Period sell-through rate</dt><dd id="stRate">0%</dd>
            <dt>Annualized (estimate)</dt><dd id="annualized">—</dd>
            <dt>Units still listed</dt><dd id="remaining">0</dd>
            <dt>Avg days per sale</dt><dd id="daysPerSale">—</dd>
        </dl></div>
        <p class="tool-hint" id="stNote" hidden></p>
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a class="btn btn--outline" href="/funnel-tools/">← All free tools</a>
      </p>
    </div>
  </main>
  <footer class="site-footer"><div class="container"><p>&copy; 2026 Inventr</p></div></footer>
  <script src="../js/tools.js"></script>
</body>
</html>
