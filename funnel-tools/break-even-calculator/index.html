<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Break-Even Calculator — Inventr</title>
  <meta name="description" content="How many sales you need to cover rent, fees, and fixed costs.">
  <link rel="canonical" href="https://consignment.314-apps.com/funnel-tools/break-even-calculator/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body data-tool="break-even-calculator">
  <header class="site-header">
    <div class="container">
      <a href="/blog/" class="logo">Inventr <span>Blog</span></a>
      <nav class="nav-links">
        <a href="/blog/">All Posts</a>
        <a href="/funnel-tools/">Free Tools</a>
        <a class="btn btn--primary btn--sm" href="https://inventrapp.com?utm_source=funnel_tools&amp;utm_medium=break-even-calculator" target="_blank" rel="noopener">Try Inventr Free</a>
      </nav>
    </div>
  </header>
  <section class="hero hero--small">
    <div class="container">
      <h1>Break-Even Calculator</h1>
      <p>How many sales you need to cover rent, fees, and fixed costs.</p>
    </div>
  </section>
  <main>
    <div class="container">
      <div class="tool-panel">
        <div class="tool-field"><label for="fixed">Monthly fixed costs ($)</label><input type="number" id="fixed" min="0" step="1" value="350"></div>
        <div class="tool-grid-2">
          <div class="tool-field"><label for="profitPerSale">Average net profit per sale ($)</label><input type="number" id="profitPerSale" min="0" step="0.01" value="18"></div>
          <div class="tool-field"><label for="avgSale">Average sale price ($)</label><input type="number" id="avgSale" min="0" step="0.01" value="42"></div>
        </div>
        <div class="tool-results"><h3>Break-even</h3><dl>
            <dt>Sales needed per month</dt><dd id="unitsNeeded">—</dd>
            <dt>Gross revenue at break-even</dt><dd id="revenueNeeded">—</dd>
        </dl></div>
        <p class="tool-hint" id="beNote" hidden></p>
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a class="btn btn--outline" href="/funnel-tools/">← All free tools</a>
      </p>
    </div>
  </main>
  <footer class="site-footer"><div class="container"><p>&copy; 2026 Inventr</p></div></footer>
  <script src="../js/tools.js"></script>
</body>
</html>
