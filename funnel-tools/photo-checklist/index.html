<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Checklist — Inventr</title>
  <meta name="description" content="Every shot to capture before you list an item.">
  <link rel="canonical" href="https://consignment.314-apps.com/funnel-tools/photo-checklist/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body data-tool="photo-checklist">
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">Inventr</a>
      <nav class="nav-links">
        <a href="/">Guides</a>
        <a href="/funnel-tools/">Free Tools</a>
        <a class="btn btn--primary btn--sm" href="https://apps.apple.com/us/app/resell-tracker-flip-profit/id6753903683?utm_source=funnel_tools&amp;utm_medium=photo-checklist" target="_blank" rel="noopener">Try Inventr Free</a>
      </nav>
    </div>
  </header>
  <section class="hero hero--small">
    <div class="container">
      <h1>Photo Checklist</h1>
      <p>Every shot to capture before you list an item.</p>
    </div>
  </section>
  <main>
    <div class="container">
      <div class="tool-panel">
        <ul class="checklist" id="photo-checklist">
          <li><input type="checkbox" data-id="photo-checklist-0" id="photo-checklist-0"><label for="photo-checklist-0">Hero shot on neutral background</label></li>
          <li><input type="checkbox" data-id="photo-checklist-1" id="photo-checklist-1"><label for="photo-checklist-1">Full front view</label></li>
          <li><input type="checkbox" data-id="photo-checklist-2" id="photo-checklist-2"><label for="photo-checklist-2">Brand / size / care tag close-up</label></li>
          <li><input type="checkbox" data-id="photo-checklist-3" id="photo-checklist-3"><label for="photo-checklist-3">Any flaws or wear (with scale)</label></li>
          <li><input type="checkbox" data-id="photo-checklist-4" id="photo-checklist-4"><label for="photo-checklist-4">Measurements for clothing</label></li>
          <li><input type="checkbox" data-id="photo-checklist-5" id="photo-checklist-5"><label for="photo-checklist-5">Weight for shipping estimate</label></li>
        </ul>
        <div class="tool-actions"><button type="button" class="btn secondary" id="checklist-reset">Reset checklist</button></div>
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a class="btn btn--outline" href="/funnel-tools/">← All free tools</a>
      </p>
    </div>
  </main>
  <footer class="site-footer"><div class="container"><p>&copy; 2026 Inventr</p></div></footer>
  <script src="../js/tools.js"></script>
</body>
</html>
