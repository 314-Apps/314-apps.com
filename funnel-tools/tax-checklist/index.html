<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax Checklist — Inventr</title>
  <meta name="description" content="Schedule C prep checklist for resale businesses.">
  <link rel="canonical" href="https://consignment.314-apps.com/funnel-tools/tax-checklist/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body data-tool="tax-checklist">
  <header class="site-header">
    <div class="container">
      <a href="/blog/" class="logo">Inventr <span>Blog</span></a>
      <nav class="nav-links">
        <a href="/blog/">All Posts</a>
        <a href="/funnel-tools/">Free Tools</a>
        <a class="btn btn--primary btn--sm" href="https://apps.apple.com/us/app/resell-tracker-flip-profit/id6753903683?utm_source=funnel_tools&amp;utm_medium=tax-checklist" target="_blank" rel="noopener">Try Inventr Free</a>
      </nav>
    </div>
  </header>
  <section class="hero hero--small">
    <div class="container">
      <h1>Tax Checklist</h1>
      <p>Schedule C prep checklist for resale businesses.</p>
    </div>
  </section>
  <main>
    <div class="container">
      <div class="tool-panel">
        <p class="tool-hint">Check tasks off and optionally enter dollar amounts — totals update live. Nothing is saved online.</p>
        <ul class="checklist" id="tax-checklist">
          <li>
            <input type="checkbox" data-id="tax-0" id="tax-0">
            <label for="tax-0">Export all platform sales reports</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Export all platform sales reports">
          </li>
          <li>
            <input type="checkbox" data-id="tax-1" id="tax-1">
            <label for="tax-1">Separate personal vs business purchases</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Separate personal vs business purchases">
          </li>
          <li>
            <input type="checkbox" data-id="tax-2" id="tax-2">
            <label for="tax-2">Mileage log for sourcing trips</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Mileage log for sourcing trips">
          </li>
          <li>
            <input type="checkbox" data-id="tax-3" id="tax-3">
            <label for="tax-3">Home office deduction worksheet</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Home office deduction worksheet">
          </li>
          <li>
            <input type="checkbox" data-id="tax-4" id="tax-4">
            <label for="tax-4">Inventory snapshot (year-end)</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Inventory snapshot (year-end)">
          </li>
          <li>
            <input type="checkbox" data-id="tax-5" id="tax-5">
            <label for="tax-5">1099-K / 1099-NEC forms received</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for 1099-K / 1099-NEC forms received">
          </li>
          <li>
            <input type="checkbox" data-id="tax-6" id="tax-6">
            <label for="tax-6">Schedule C expense categories mapped</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Schedule C expense categories mapped">
          </li>
          <li>
            <input type="checkbox" data-id="tax-7" id="tax-7">
            <label for="tax-7">Quarterly estimated payments reviewed</label>
            <input type="text" class="money-in" inputmode="decimal" placeholder="$" aria-label="Amount for Quarterly estimated payments reviewed">
          </li>
        </ul>
        <div class="tool-results"><h3>Expense total (entered amounts)</h3><dl><dt>Sum</dt><dd id="checklist-total">$0.00</dd></dl></div>
        <div class="tool-actions"><button type="button" class="btn secondary" id="checklist-reset">Reset</button></div>
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a class="btn btn--outline" href="/funnel-tools/">← All free tools</a>
      </p>
    </div>
  </main>
  <footer class="site-footer"><div class="container"><p>&copy; 2026 Inventr</p></div></footer>
  <script src="../js/tools.js"></script>
</body>
</html>
